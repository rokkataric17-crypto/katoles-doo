        <h1>KATOLES</h1>

<!-- HERO -->
<section id="domov" class="hero">
    <div class="hero-text" data-aos="fade-up">
        <h2>KATOLES</h2>
        <p>Vaš partner za varno in učinkovito delo v gozdu</p>
        <a href="#kontakt" class="btn">Kontakt</a>
    </div>
</section>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Harvester_cutting_tree.jpg">
    <h3>Sečnja in spravilo</h3>
</div>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8f/Forwarder_loading_logs.jpg">
    <h3>Odkup lesa</h3>
</div>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Forestry_tractor.jpg">
    <h3>Arboristika</h3>
</div>

    </div>
</section>

<div class="gallery">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8f/Forwarder_loading_logs.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Harvester_cutting_tree.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Forestry_tractor.jpg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Logging_truck_loaded.jpg">
</div>
</section>

<!-- BEFORE / AFTER -->
<section id="projekti" class="container">
    <h2 data-aos="fade-up">Projekti (prej / potem)</h2>

    <div class="before-after">
        <div>
            <h4>PREJ</h4>
            <img src="https://images.unsplash.com/photo-dense-forest">
        </div>
        <div>
            <h4>POTEM</h4>
            <img src="https://images.unsplash.com/photo-cleared-land">
        </div>
    </div>
</section>

<!-- KONTAKT -->
<section id="kontakt" class="container kontakt">
    <h2>Kontakt</h2>

    <p><strong>Telefon:</strong> 040 123 456</p>
    <p><strong>Email:</strong> info@katoles.si</p>

    <!-- MAPA -->
    <div class="map">
        <iframe 
            src="https://www.google.com/maps?q=Slovenia&output=embed"
            width="100%" height="350" style="border:0;">
        </iframe>
    </div>

    <!-- OBRAZEC (DELUJOČ) -->
    <form action="https://formspree.io/f/mzzpabcd" method="POST">
        <input type="text" name="name" placeholder="Ime" required>
        <input type="email" name="email" placeholder="Email" required>
        <textarea name="message" placeholder="Sporočilo"></textarea>
        <button type="submit">Pošlji</button>
    </form>
</section>

</footer>
